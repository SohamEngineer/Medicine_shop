version: "3.9"

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: medicine_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: medicine_shop

  # Express Backend
  server:
    build: ./Server
    container_name: medicine_server
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/medicine_shop
      - JWT_SECRET=${JWT_SECRET}
      - AI_SERVICE_URL=http://ai-service:8000
      - PORT=5000
    depends_on:
      - mongo
      - ai-service
    volumes:
      - ./Server:/app
      - /app/node_modules

  # React Frontend
  client:
    build: ./Client
    container_name: medicine_client
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:5000
      - VITE_AI_SERVICE_URL=http://localhost:8000
    depends_on:
      - server

  # FastAPI AI Service
  ai-service:
    build: ./ai-service
    container_name: medicine_ai
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    restart: unless-stopped

volumes:
  mongo_data:
